<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBGE Estate Access System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(160deg, #001a3a 0%, #0047ab 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 36px 28px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 16px 48px rgba(0,0,0,0.3);
    }
    .logo { width: 140px; margin-bottom: 16px; }
    h1 { color: #002855; font-size: 20px; margin-bottom: 4px; }
    .subtitle { color: #777; font-size: 13px; margin-bottom: 28px; }
    .role-btn {
      display: block;
      width: 100%;
      padding: 17px;
      margin: 9px 0;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.4px;
      cursor: pointer;
      color: #fff;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.1s;
    }
    .role-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .role-btn:active { transform: translateY(0); opacity: 1; }
    .btn-resident { background: #007bff; }
    .btn-guard    { background: #218838; }
    .btn-admin    { background: #495057; }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="logo.png" alt="MBGE Logo">
    <h1>MBGE Estate Access System</h1>
    <p class="subtitle">Select your role to continue</p>
    <a class="role-btn btn-resident" href="login.html">Resident Portal</a>
    <a class="role-btn btn-guard"    href="guard.html">Security Guard</a>
    <a class="role-btn btn-admin"    href="admin.html">Estate Admin</a>
  </div>
</body>
</html>
