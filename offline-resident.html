<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="manifest" href="/manifest-resident.json">
<meta name="theme-color" content="#1565c0">
<title>Offline — MBGE Resident</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { background:linear-gradient(135deg,#1565c0 0%,#0d1b2a 100%);
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; padding:20px; }
.card { background:#fff; border-radius:14px; padding:36px 24px;
  max-width:380px; width:100%; text-align:center; }
.icon { font-size:3.5rem; margin-bottom:14px; }
h2 { color:#1565c0; margin-bottom:10px; }
p { color:#666; font-size:.9rem; margin-bottom:20px; line-height:1.5; }
button { padding:12px 24px; background:#1565c0; color:#fff; border:none;
  border-radius:8px; font-size:.95rem; font-weight:600; cursor:pointer; }
.emergency { margin-top:20px; font-size:.8rem; color:#dc3545; font-weight:600; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">📡</div>
  <h2>No Connection</h2>
  <p>The MBGE Resident Portal requires a network connection. Please check your Wi-Fi or mobile data and try again.</p>
  <button onclick="window.location.reload()">Try Again</button>
  <div class="emergency">🚨 Emergency? Call SAPS 10111 or estate security directly</div>
</div>
</body>
</html>
